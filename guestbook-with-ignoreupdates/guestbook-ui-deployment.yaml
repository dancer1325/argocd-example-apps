apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui-with-ignoreupdates
  annotations:
    # apply ONLY | this OWN deployment
    #   -> NOT apply | dependent ReplicaSet or Pod
    argocd.argoproj.io/ignore-resource-updates: 'true'
spec:
  # modify to cause a drift
  #replicas: 1
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-ui-with-ignoreupdates
  template:
    metadata:
      labels:
        app: guestbook-ui-with-ignoreupdates
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5
          name: guestbook-ui-with-ignoreupdates
          ports:
            - containerPort: 80
